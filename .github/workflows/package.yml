#
# Package (build and test) application
#
# Here is example:
#- name: Run HACS validation
#  if: false
#  uses: hacs/action@main
#  with:
#    category: plugin

name: Package Application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install npm packages
        shell: bash
        run: npm install
  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install npm packages
        shell: bash
        run: npm install
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install npm packages
        shell: bash
        run: npm install
  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install npm packages
        shell: bash
        run: npm install
